name: Daily Sanctions Data Update

# 触发条件
on:
  schedule:
    # 定时运行：GitHub Actions 使用 UTC 时间。
    # 北京时间每天晚上 12:00 (次日 00:00) 相当于 UTC 时间的下午 16:00。
    # 格式为: 分 时 日 月 星期
    - cron: '0 16 * * *'
  
  # 允许您在 GitHub 网页上手动点击按钮强制运行（方便测试）
  workflow_dispatch:

# 必须赋予 Action 修改和推送代码到您仓库的权限
permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出您的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装脚本需要的依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装我们爬虫脚本需要的核心库
          pip install pandas requests lxml beautifulsoup4

      # 4. 执行您的抓取脚本
      - name: Run fetch script
        run: |
          python fetch_all_lists.py

      # 5. 检查数据是否有更新，如果有，则自动提交到 GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add global_sanctions_database.csv
          # 只有当 CSV 文件发生变化时才提交，防止因为没有更新而报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update global sanctions database" && git push)
