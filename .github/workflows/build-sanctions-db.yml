name: Build Global Sanctions Database

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # 每天 UTC 02:00 运行（北京时间+8 => 10:00）

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Update CA certificates
        run: |
           sudo apt-get update
           sudo apt-get install -y ca-certificates
           sudo update-ca-certificates

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CSV
        env:
          SKIP_BIS: "1"
        run: python -u fetch_all_lists.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add global_sanctions_database.csv
          git diff --cached --quiet || git commit -m "Update global_sanctions_database.csv"
          git push
